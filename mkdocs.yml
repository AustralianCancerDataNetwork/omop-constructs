site_name: OMOP Constructs
site_description: Reusable OMOP analytical constructs, materialized views, and episode-linked query building blocks
site_url: https://AustralianCancerDataNetwork.github.io/omop-constructs
repo_url: https://github.com/AustralianCancerDataNetwork/omop-constructs
repo_name: omop-constructs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - attr_list
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: false
            docstring_style: numpy
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Usage: usage.md
  - Architecture: architecture.md
  - Construct Catalog: construct-catalog.md
